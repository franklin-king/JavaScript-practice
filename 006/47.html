<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function getSum() {
        let num1 = +prompt("输入第一个数：");
        let num2 = +prompt("输入第二个数： ");
        sum = num1 + num2;
        console.log(sum);
      }
      function get100() {
        let sum = 0;
        for (let i = 1; i <= 100; i++) {
          sum += i;
        }
        console.log(sum);
      }

      getSum();
      get100();
    </script>
  </body>
</html>
