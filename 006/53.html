<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function getMax(arr = []) {
        let max = arr[0];
        let min = arr[0];
        for (let i = 0; i < arr.length; i++) {
          if (max < arr[i]) {
            max = arr[i];
          }

          if (min > arr[i]) {
            min = arr[i];
          }
        }
        return [max, min];
      }
      let num = getMax([16, 16, 161, 61, 565, 1654, 4, 651, 65, 685]);
      console.log(`最大值为${num[0]}`);
      console.log(`最小值为${num[1]}`);
    </script>
  </body>
</html>
