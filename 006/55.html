<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let second = +prompt("输入秒数：");

      function getTime(t) {
        let h = parseInt((t / 60 / 60) % 24);
        let m = parseInt((t / 60) % 60);
        let s = parseInt(t % 60);
        if (h < 10) {
          h = "0" + h;
        }
        m = m > 0 ? m : "0" + m;
        s = s > 0 ? s : "0" + s;
        return `结果为${h}时${m}分${s}秒`;
      }
      let str = getTime(second);
      alert(str);
    </script>
  </body>
</html>
