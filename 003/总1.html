<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        border-collapse: collapse;
        margin: 0 auto;
        text-align: center;
      }
      h1 {
        text-align: center;
      }
      table,
      th,
      td {
        border: 1px solid #000;
      }
      th,
      td {
        padding: 10px 25px;
      }
    </style>
  </head>
  <body>
    <h1>订单确认</h1>
    <script>
      let price = Number(prompt("商品价格是： "));
      let number = Number(prompt("商品数量是： "));
      let total = price * number;
      let address = prompt("地址是： ");
      document.write(`
        <table>
          <tr>
            <th>商品名称</th>
            <th>商品价格</th>
            <th>商品数量</th>
            <th>总价</th>
            <th>地址</th>
          </tr>
          <tr>
            <td>手机</td>
            <td>${price}</td>
            <td>${number}</td>
            <td>${total}</td>
            <td>${address}</td>
          </tr>
        </table>
      `);
    </script>
  </body>
</html>
