<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num1 = +prompt("输入第一个数：");
      let num2 = +prompt("输入第二个数：");
      let sp = prompt("输入运算符：");
      switch (sp) {
        case "+":
          alert(`运算是加法，结果为${num1 + num2}`);
          break;
        case "-":
          alert(`运算是减法，结果为${num1 - num2}`);
          break;
        case "*":
          alert(`运算是乘法，结果为${num1 * num2}`);
          break;
        case "/":
          alert(`运算是除法，结果为${num1 / num2}`);
          break;
        default:
          alert("没有符合条件的运算");
          break;
      }
    </script>
  </body>
</html>
