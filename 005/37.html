<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      span {
        display: inline-block;
        padding: 5px 10px;
        width: 100px;
        border: 1px solid #000;
        margin: 2px;
        border-radius: 5px;
        box-shadow: 2px 2px 2px pink;
        background-color: rgb(237, 96, 159);
      }
    </style>
  </head>
  <body>
    <script>
      for (let i = 1; i <= 9; i++) {
        for (let j = 1; j <= i; j++) {
          document.write(`<span>${j}×${i}=${i * j}</span>`);
        }
        document.write("<br>");
      }
    </script>
  </body>
</html>
